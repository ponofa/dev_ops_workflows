name: Expresion
on: 
  workflow_dispatch:
    inputs:
      edad: 
        description: 'Edad' 
        required: true
        default: 30
        type: number
      nombre: 
        description: 'Nombre' 
        required: true
        default: 'Valor default'
        type: string
  push: 
    branches: ["main"]
  issues: 
    types: 
      - closed
      - opened
jobs:
  mayor:
    if: ${{ inputs.edad >= 18 }}
    runs-on: ubuntu-latest
    steps:
      - name: Correr script
        run: echo ${{ inputs.nombre }} es mayor de edad
      - name: Mostrar nombre de evento
        run: echo ${{ github.event_name }}
      - name: Mostrar usuario
        run: echo ${{ github.actor }}
      - name: Retorna Ref - Repository - Issue title
        run: echo ${{ github.ref}} - ${{ github.repository }} - ${{github.event.issue.title}} 
  menor:
    if: ${{ inputs.edad < 18 }}
    runs-on: ubuntu-latest
    steps:
      - name: Corrre script meno
        run: echo ${{ inputs.nombre }} es menor de edad
        
