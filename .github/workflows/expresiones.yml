name: Expresion
on: 
  workflow_dispatch:
    inputs:
      edad: 
        description: 'Edad' 
        required: true
        default: 30
        type: number
      nombre: 
        description: 'Nombre' 
        required: true
        default: 'Valor default'
        type: string
  push: 
    branches: ["main"]
  issues: 
    types: 
      - closed
      - opened
env:
  AMBIENTE: produccion
  REGION: us-east-1
jobs:    
  tipo_issue: 
     if: ${{ github.event_name == 'issues' }}
     runs-on: ubuntu-latest     
     env:
       NODE_ENV: development
     steps:       
       - name: Correr script
         run: echo ${{ inputs.nombre }} es mayor de edad
         env:
           NOMBRE: prueba
       - name: Mostrar nombre de evento
         run: echo ${{ github.event_name }}
       - name: Mostrar usuario
         run: echo ${{ github.actor }}
       - name: Retorna Ref - Repository - Issue title
         run: echo ${{ github.ref}} - ${{ github.repository }} - ${{github.event.issue.title}} 
       - id: obtener_version
         run: echo "version=1.0.0" >> $GITHUB_OUTPUT
       - run: echo ${{steps.obtener_version.outputs.version}}
       - name: Mostrar variable de entorno
         run: echo "Ambiente - ${{ env.AMBIENTE }} - ${{ env.REGION }}"
  mayor:
    if: ${{ inputs.edad >= 18 }}
    runs-on: ubuntu-latest
    steps:
      - name: Correr script
        run: echo ${{ inputs.nombre }} es mayor de edad
      - name: Mostrar nombre de evento
        run: echo ${{ github.event_name }}
      - name: Mostrar usuario
        run: echo ${{ github.actor }}
      - name: Retorna Ref - Repository - Issue title
        run: echo Version - ${{ github.ref}} - ${{ github.repository }} - ${{github.event.issue.title}}
  menor:
    if: ${{ inputs.edad < 18 }}
    runs-on: ubuntu-latest
    steps:
      - name: Corrre script meno
        run: echo ${{ inputs.nombre }} es menor de edad
      - name: Que valor tiene el input
        run: echo ${{ inputs.nombre }} - ${{ inputs.edad }}
      - name: Retorna Ref - Repository - Issue title
        run: echo ${{ github.ref}} - ${{ github.repository }} - ${{github.event.issue.title}} 
        
